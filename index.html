<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiBuild</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:#6b6b6b;
      --line:#e8e8e8;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* Top bar */
    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .nav{
      max-width: 1100px;
      margin:0 auto;
      height:64px;
      display:grid;
      grid-template-columns: 1fr auto 1fr; /* left links | centered brand | right (empty for now) */
      align-items:center;
      padding:0 20px;
    }

    .leftlinks{
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:flex-start;
    }

    .brand{
      font-weight:600;
      letter-spacing:0.2px;
      font-size:18px;
      text-align:center;
    }

    .rightlinks{
      display:flex;
      justify-content:flex-end;
      gap:12px;
    }

    a.navlink, button.navlink{
      appearance:none;
      border:0;
      background:transparent;
      cursor:pointer;
      padding:8px 0;
      font-size:14px;
      color:var(--muted);
      text-decoration:none;
    }
    a.navlink:hover, button.navlink:hover{color:var(--text)}
    a.navlink.active{color:var(--text); font-weight:600}

    /* Dropdown */
    .dropdown{
      position:relative;
      display:inline-block;
    }
    .menu{
  position:absolute;
  top:30px;
  left:0;
  min-width:180px;
  margin-top:8px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
  display:none;
}
    .menu a{
      display:block;
      padding:10px 10px;
      border-radius:10px;
      color:var(--text);
      text-decoration:none;
      font-size:14px;
    }
    .menu a:hover{
      background:#f5f5f5;
    }
    .dropdown:hover .menu, .dropdown:focus-within .menu{   display:block; }

    /* Page content placeholder */
    .wrap{
  max-width:1100px;
  margin:0 auto;
  padding:70px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}
    .heroTitle{
      font-size:56px;
      letter-spacing:-1px;
      margin:0 0 14px;
      line-height:1.05;
    }
    .heroSub{
      max-width:720px;
      color:var(--muted);
      font-size:18px;
      line-height:1.6;
      margin:0;
    }

    @media (max-width:720px){
      .nav{grid-template-columns: 1fr auto;}
      .rightlinks{display:none}
      .heroTitle{font-size:42px}
    }
  </style>
</head>

<body>
  <header class="topbar">
    <nav class="nav">
      <div class="leftlinks">
        <div class="dropdown">
          <button class="navlink active">Signature Builds</button>
          <div class="menu">
            <a href="#workstation">Workstation</a>
            <a href="#gaming">Gaming</a>
          </div>
        </div>

        <a class="navlink" href="consultancy.html">Consultancy</a>
        <a class="navlink" href="about.html">About Us</a>
        <a class="navlink" href="components.html">Sourcing</a>
      </div>

      <div class="brand">OptiBuild</div>

      <div class="rightlinks"></div>
    </nav>
  </header>

  <main class="wrap">
    <h1 class="heroTitle">Performance Redefined</h1>
    <p class="heroSub">   Premium custom builds — designed around your needs, assembled properly, and delivered with full in-home setup. </p>
  </main>
</body>
</html>
